name: oncallenv-redshift
version: "1.0.0"
description: >
  OnCallEnv Red Shift is an OpenEnv-compatible SRE incident-response
  environment with a pure-Python microservice simulator, OpenTelemetry-shaped
  telemetry, a defender tool surface, composable OpenEnv Rubric rewards, and
  seed scenarios for attacker/autocurriculum self-play.

author: oncall-env-team
tags:
  - openenv
  - sre
  - incident-response
  - self-play
  - multi-agent

observation_space:
  type: object
  description: >
    Observation includes active alerts, last action result, available SRE tools,
    service names, elapsed incident time, task goal, RCA requirement, reward, and
    reward breakdown.

action_space:
  type: object
  description: >
    Action has a command string parsed as an SRE tool call. Tools include
    kubectl_get_pods, kubectl_logs, kubectl_top, promql_query, logql_query,
    jaeger_search, istioctl_proxy_status, istioctl_routes, curl_service,
    dns_lookup, check_deploy_history, kubectl_rollout_undo,
    kubectl_rollout_restart, kubectl_scale, feature_flag_toggle,
    traffic_split_update, kubectl_apply_config, post_status_update,
    declare_resolved, and submit_rca.

reward:
  type: float
  range: [0.0, 1.0]
  description: >
    Weighted OpenEnv Rubric composition: RecoveryRubric 0.35, RCAQualityRubric
    0.30, BlastRadiusRubric 0.25, SafetyRubric 0.10. REWARD_CAP may optionally
    clamp total reward for capped-vs-uncapped ablations.

tasks:
  - id: seed_easy_memory_leak
    name: "Seed: Payment Service OOM Kill"
    difficulty: easy
    max_steps: 25
  - id: seed_dns_misconfiguration
    name: "Seed: DNS Misconfiguration"
    difficulty: medium
    max_steps: 25
  - id: seed_cert_expiry
    name: "Seed: Certificate Expiry"
    difficulty: medium
    max_steps: 25
  - id: seed_cache_stampede
    name: "Seed: Cache Stampede"
    difficulty: hard
    max_steps: 25
  - id: seed_replica_lag
    name: "Seed: Replica Lag"
    difficulty: hard
    max_steps: 25
  - id: seed_http_503_loop
    name: "Seed: HTTP 503 Loop with Secondary Partition"
    difficulty: expert
    max_steps: 25

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  close: POST /close
  tasks: GET /tasks
  health: GET /health
